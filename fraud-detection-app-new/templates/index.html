<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-Based Fraud Detection System for Online Transactions with Real-Time Alerts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="theme-toggle">
    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
</div>

<div class="main-wrapper">
    <div class="glass-card">

        <h2 class="title">
            <i class="bi bi-shield-lock-fill"></i>
            AI-Based Fraud Detection System for Online Transactions with Real-Time Alerts
        </h2>

        <p class="subtitle">Smart Financial Transaction Monitoring</p>

        <form action="/predict" method="post">

            <div class="row">
                {% for i in range(1, 30) %}
                <div class="col-md-4 mb-3">
                    <input type="number" step="any"
                           class="form-control modern-input"
                           name="feature{{ i }}"
                           placeholder="Feature {{ i }}" required>
                </div>
                {% endfor %}
            </div>

            <button type="submit" class="btn modern-btn w-100">
                <i class="bi bi-search"></i> Analyze Transaction
            </button>

            <button type="button" id="fill-sample" class="btn btn-outline-light w-100 mt-2">
                <i class="bi bi-lightning-fill"></i> Fill Sample Fraud Data
            </button>
        </form>

        {% if prediction %}
        <div class="result-box {{ alert_class }}">
            <h4>{{ prediction }}</h4>
            <p>Fraud Probability: <strong>{{ probability }}</strong></p>
        </div>
        {% endif %}

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
